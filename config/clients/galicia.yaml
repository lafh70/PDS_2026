client_name: galicia
version: "2026-Q1"

storage:
  entrada_canonica:
    provider: hybrid
    local_path: galicia_data/entrada_canonica/
    sharepoint_folder: M44/Descargas
    read_from: local_first
    write_to: both
  entrada_materializada:
    provider: hybrid
    local_path: galicia_data/entrada/
    sharepoint_folder: M45/Intermedios
    read_from: local_first
    write_to: both
  salidas:
    provider: hybrid
    local_path: galicia_data/out_/
    sharepoint_folder: M43/Reportes
    read_from: local_first
    write_to: both
  logs:
    provider: hybrid
    local_path: galicia_data/logs/
    sharepoint_folder: M46/Auditoria
    write_to: both
  sharepoint_site: "https://jlllatam.sharepoint.com/sites/Galicia"

semaforos:
  ddo_negro_keywords: ["CANCELADO", "NO REQUIERE"]
  ddo_verde_keywords: ["ADJUDICADO", "ADJUDICADA"]
  ddo_amarillo_keywords: ["EN PROCESO"]
  ddo_alerta_ventana_dias: 7
  gc_alerta_ventana_dias: 7
  permits_alerta_ventana_dias: 7
  finance_alerta_porcentaje: 80

forecast:
  duraciones_obras:
    INTEGRAL: 150
    MEDIA: 110
    BAJA: 45
    CORPORATIVO: 150
    RELOCALIZACION: 200
  intervalo_h1_h2: 28
  intervalo_h2_h3: 35
  intervalo_h3_h4: 28
  intervalo_h4_h5: 35
  intervalo_h5_h6: 10

columnas_override:
  Nombre: "Nombre_Proyecto"
  H6: "Fecha_Inicio_Obra"
  H11: "Fecha_Cierre_Final"

ingestion:
  modo: automatico
