        condition: "warning"
        reason_es: "Presupuesto cerca del limite"
      RED:
        condition: "critical"
        reason_es: "Presupuesto critico"

  construction_start:
    label_en: "Construction"
    label_es: "Obra"
    source_columns: [H6, H7, Etapa]
    rules:
      GREEN:
        condition: "started"
        reason_es: "Obra iniciada"
      YELLOW:
        condition: "default"
        reason_es: "Obra pendiente"

  procurement_transport:
    label_en: "Transport"
    label_es: "Transporte"
    source_columns: [Licitación_Transportista, H11]
    critical_days_to_h11: 14
    rules:
      BLACK:
        condition: "not required"
        reason_es: "Transporte NO REQUIERE"
      GREEN:
        condition: "awarded"
        reason_es: "Transportista adjudicado"
      RED:
        condition: "critical near H11"
        reason_es: "Transporte sin adjudicar; H11 proximo"
      YELLOW:
        condition: "in process"
        reason_es: "Licitacion transportista en proceso"
      ORANGE:
        condition: "quoting"
        reason_es: "A la espera de cotizaciones"
      WHITE:
        condition: "not started"
        reason_es: "Transporte por iniciar"
